  <!-- parallax immagine dell'header che si sposta mentre scrollo -->
  <script>
    const header = document.querySelector('header');

    function updateParallax() {
      const offset = window.pageYOffset;
      // calcolo la posizione verticale del background
      header.style.backgroundPositionY = offset * 0.4 + "px";
    }

    // aggiorna subito al caricamento della pagina
    updateParallax();

    // aggiorna ad ogni scroll
    window.addEventListener('scroll', updateParallax);
  </script>

  <!-- Icone che fanno la stessa animazione che c'era con le fe icons -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js"></script>
  <script>
    new WOW().init();
  </script>

</body>
