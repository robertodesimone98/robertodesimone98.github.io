<!-- per tornare al portfolio dalla pagina di progetto-->
<script>
document.addEventListener("DOMContentLoaded", function() {
  // se c’è un hash nell’URL
  if (window.location.hash) {
    let hash = window.location.hash;
    // aspetta un momento per permettere al browser di posizionarsi
    setTimeout(function() {
      const element = document.querySelector(hash);
      if (element) {
        const navbar = document.querySelector('.navbar-fixed-top') || document.querySelector('nav');
        const offset = navbar ? navbar.offsetHeight : 0;
        const position = element.getBoundingClientRect().top + window.pageYOffset - offset;
        window.scrollTo({ top: position, behavior: 'smooth' });
      }
    }, 50);
  }
});
</script>
